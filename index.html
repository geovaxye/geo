<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOVAXUE • Доступ к каналу</title>
    <style>
        /* Базовые стили и сброс */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Фоновый цвет сделан чуть-чуть светлее стандартного темного (#121214 вместо #0d0d0e) */
            background-color: #19191c;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Контейнер лендинга */
        .container {
            background-color: #222226;
            border-radius: 16px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            /* Насыщенный неоновый голубой для легкого свечения границ */
            border: 1px solid #00d2ff;
        }

        /* Блок с аватаром */
        .avatar-container {
            margin-bottom: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            /* Насыщенный неоновый голубой цвет для рамки */
            border: 3px solid #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        /* Заголовки и имена */
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 25px;
        }

        /* Стили кнопки */
        .btn-tg {
            display: inline-block;
            width: 100%;
            padding: 14px;
            /* Насыщенный неоновый голубой фон для кнопки */
            background-color: #00d2ff;
            color: #121214;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            margin-bottom: 10px;
        }

        .btn-tg:hover {
            background-color: #00b4dc;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.6);
            transform: translateY(-1px);
        }

        /* Футер / Описание под кнопкой */
        .footer-text {
            font-size: 13px;
            color: #777777;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <img src="avaf.jpg" alt="GEOVAXUE" class="avatar">
        </div>

        <h1>GEOVAXUE</h1>

        <div class="subtitle">GEOVAXUE • Доступ к каналу</div>

        <a href="#" class="btn-tg">Перейти в Telegram-канал</a>

        <div class="footer-text">
            © 2026 Все права защищены.
        </div>
    </div>

</body>
</html>
