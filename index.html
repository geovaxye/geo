    <style>
        :root {
            --bg-color: #16191f; 
            --neon-cyan: #00f3ff; 
            --neon-glow: 0 0 15px rgba(0, 243, 255, 0.6), 0 0 30px rgba(0, 243, 255, 0.3);
            --card-bg: #1f242d;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: center;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .avatar-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--neon-cyan);
            box-shadow: var(--neon-glow);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .official-badge {
            font-size: 12px;
            color: var(--neon-cyan);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
        }

        .btn-telegram {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--neon-cyan);
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-telegram:hover {
            background-color: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
        }

        .cards-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: border 0.3s ease;
        }

        .card:hover {
            border-color: var(--neon-cyan);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge-new {
            background-color: var(--neon-cyan);
            color: #000000;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .card-body {
            font-size: 15px;
        }

        .bonus-highlight {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-top: 4px;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
        }

        .btn-card-action {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--neon-cyan);
            color: #000000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            transition: opacity 0.2s ease;
        }

        .btn-card-action:hover {
            opacity: 0.9;
        }

        .vpn-header-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .vpn-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #ffffff;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vpn-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .vpn-title-text {
            display: flex;
            flex-direction: column;
        }

        .vpn-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .vpn-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
        }

        .vpn-tag {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
